name: Deploy Dashboard (Live Loop)

# This workflow lives in the DASHBOARD repo (idvtuber-tracker/dashboard),
# NOT in the tracker repo.
#
# FAST LOOP — runs on every tracker push (effectively every ~15 min or
# whatever cadence the tracker pushes at). This is intentionally narrow in
# scope: generate_live.py ONLY regenerates currently-live and just-finished
# stream pages, plus their parent channel/org pages and the index. It does
# NOT scan for brand-new VODs that were never seen live — that reconciliation
# is handled by the separate generate_backfill.py workflow on a slower
# (hourly) cadence. This split is what keeps this workflow's runtime bounded
# by "how many channels are concurrently live right now" instead of "how
# many streams exist in the entire historical archive" — see
# deploy_dashboard_backfill.yml for the counterpart.
#
# It is triggered in two ways:
#   1. repository_dispatch with event type "deploy-dashboard"
#      → fired automatically by tracker.py after every successful push.
#   2. workflow_dispatch
#      → for manual re-deploys from the GitHub Actions UI.
#
# What it does:
#   - Checks out the dashboard repo (this repo), which already contains the
#     latest generated HTML/CSS/JS pushed by tracker.py.
#   - Clones idvt-history for archived stream data used by generate_live.py.
#   - Runs generate_live.py to update only live/just-ended stream pages.
#   - Deploys the dashboard/ directory to GitHub Pages.
#
# Note: there is NO "commit cache back to repo" step here. The tracker repo
# owns cache/ and manifest.json; this repo only ever holds generated output.
#
# CONCURRENCY FIX (see below): tracker.py fires repository_dispatch on every
# push, which can happen faster than one deploy cycle takes. Two overlapping
# runs would each check out the SAME base manifest.json, generate
# independently, and then race to commit — the loser's push either fails or
# (worse) silently clobbers the winner's manifest with a stale version that
# never saw the winner's dirty-set updates. This makes manifest.json
# effectively never accumulate state, so every run looks like a cold start
# with everything dirty. cancel-in-progress is now false and the group
# covers the whole workflow (not just the Pages deploy step) so runs queue
# up and execute one at a time, each starting from the previous run's
# committed manifest.

on:
  repository_dispatch:
    types: [deploy-dashboard]
  workflow_dispatch:

permissions:
  contents: write
  pages:    write
  id-token: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    env:
      AIVEN_DATABASE_URL:   ${{ secrets.AIVEN_DATABASE_URL }}
      YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_API_KEYS:     ${{ secrets.YOUTUBE_API_KEYS }}
      DASHBOARD_OUTPUT_DIR: dashboard
      PYTHONUTF8:           "1"
      PYTHONIOENCODING:     "utf-8"

    steps:
      - name: Clean up old deploy runs
        run: |
          HEADERS=(-H "Authorization: Bearer ${{ secrets.GH_PAT }}"
                   -H "Accept: application/vnd.github+json"
                   -H "X-GitHub-Api-Version: 2022-11-28")
          REPO="${{ github.repository }}"
          CURRENT="${{ github.run_id }}"

          # Fetch completed runs of this workflow only
          RUNS=$(curl -s "${HEADERS[@]}" \
            "https://api.github.com/repos/$REPO/actions/workflows/deploy_dashboard.yml/runs?status=completed&per_page=100" \
            | python3 -c "
          import sys, json
          runs = json.load(sys.stdin).get('workflow_runs', [])
          for r in runs:
              print(r['id'])
          ")

          for RUN_ID in $RUNS; do
            if [ "$RUN_ID" != "$CURRENT" ]; then
              curl -s -X DELETE "${HEADERS[@]}" \
                "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID"
              echo "Deleted run $RUN_ID"
            fi
          done
          echo "Cleanup complete."

      # Checks out the dashboard repo (i.e. this repo).
      # tracker.py has already pushed the latest generated HTML here, so the
      # working tree is ready for the Pages upload step below.
      # generate_dashboard.py is also present in this repo and will be run
      # to produce a final fresh build directly from the database.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Checkout history repo
        env:
          HISTORY_REPO_PAT: ${{ secrets.HISTORY_REPO_PAT }}
        run: |
          REPO_URL="https://x-access-token:${HISTORY_REPO_PAT}@github.com/${{ github.repository_owner }}/idvt-history.git"
          if git clone --depth=1 "$REPO_URL" idvt-history 2>/dev/null; then
            echo "history repo cloned successfully."
          else
            echo "history repo is empty or unreachable — creating empty directory."
            mkdir -p idvt-history
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard (live loop)
        env:
          HISTORY_DB_PATH: ${{ github.workspace }}/idvt-history/history.db
        run: python generate_live.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit cache back to dashboard repo
        # Persists cache/channel_logos_cache.json, cache/channel_logos_fallback.json,
        # and dashboard/manifest.json back to this (dashboard) repo so that:
        #   (a) the daily logo/subscriber cache survives between ubuntu runner jobs,
        #       avoiding a redundant YouTube API call on every Pages deploy,
        #   (b) the fallback file is always up-to-date, so if the API is unavailable
        #       on a future run, logos still appear on the dashboard, and
        #   (c) manifest.json accumulates dirty-tracking state across runs so the
        #       partial-rebuild logic in generate_dashboard.py actually has
        #       something to diff against.
        #
        # generate_dashboard.py resolves cache/ as Path(__file__).parent / "cache",
        # so when it runs here (dashboard repo checkout) it writes to the dashboard
        # repo's cache/ directory, which is exactly what we commit below.
        #
        # `git pull --rebase` before pushing guards against another ref update
        # having landed on the branch between our checkout and this commit
        # (e.g. tracker.py pushing again mid-run). Without this, a non-fast-
        # forward push would fail outright, or in older configurations could
        # be force-pushed and silently discard intervening changes —
        # either way losing manifest state. With concurrency now serializing
        # whole workflow runs, this should rarely trigger, but it's a cheap
        # safety net against tracker.py pushes landing mid-deploy.
        run: |
          git config user.name  "IDVTuber Dashboard"
          git config user.email "dashboard@idvtuber-tracker"
          git add cache/ dashboard/manifest.json
          if git diff --cached --quiet; then
            echo "Cache and manifest unchanged — nothing to commit."
          else
            git commit -m "cache: update channel logos fallback [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
            echo "Cache committed and pushed."
          fi
