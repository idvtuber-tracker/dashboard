name: Deploy Dashboard (Backfill Loop)

# This workflow lives in the DASHBOARD repo (idvtuber-tracker/dashboard),
# alongside deploy_dashboard.yml (the fast live-loop workflow).
#
# SLOW LOOP — runs on a schedule (hourly by default; adjust the cron below
# to taste). Its job is reconciliation: generate_backfill.py catches any
# stream that the live loop's narrower scope deliberately skips — namely,
# streams that went live and ended entirely between two live-loop runs and
# were therefore never given a manifest entry. There is no 15-minute SLA
# here, so this can run less often and tolerate a larger backlog.
#
# Once a stream's manifest entry says "vod", it is permanently clean and
# will never be touched again by either workflow — VOD viewer data is frozen
# the moment a broadcast ends, so there is no reason to keep re-fetching it.
#
# This workflow shares the SAME GitHub Pages deployment and cache-commit
# pattern as the live-loop workflow. Because both workflows write to the
# same manifest.json and both deploy to the same Pages site, they share the
# "dashboard-deploy" concurrency group so they never run simultaneously and
# clobber each other's manifest state.

on:
  schedule:
    # Runs at the top of every hour. Adjust to daily (e.g. "0 3 * * *") if
    # the backlog is consistently small and hourly is more than needed.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages:    write
  id-token: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    env:
      AIVEN_DATABASE_URL:   ${{ secrets.AIVEN_DATABASE_URL }}
      YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_API_KEYS:     ${{ secrets.YOUTUBE_API_KEYS }}
      DASHBOARD_OUTPUT_DIR: dashboard
      PYTHONUTF8:           "1"
      PYTHONIOENCODING:     "utf-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Checkout history repo
        env:
          HISTORY_REPO_PAT: ${{ secrets.HISTORY_REPO_PAT }}
        run: |
          REPO_URL="https://x-access-token:${HISTORY_REPO_PAT}@github.com/${{ github.repository_owner }}/idvt-history.git"
          if git clone --depth=1 "$REPO_URL" idvt-history 2>/dev/null; then
            echo "history repo cloned successfully."
          else
            echo "history repo is empty or unreachable — creating empty directory."
            mkdir -p idvt-history
          fi
          
      - name: Clean up old deploy runs
        run: |
          HEADERS=(-H "Authorization: Bearer ${{ secrets.GH_PAT }}"
                   -H "Accept: application/vnd.github+json"
                   -H "X-GitHub-Api-Version: 2022-11-28")
          REPO="${{ github.repository }}"
          CURRENT="${{ github.run_id }}"

          # Fetch completed runs of this workflow only
          RUNS=$(curl -s "${HEADERS[@]}" \
            "https://api.github.com/repos/$REPO/actions/workflows/deploy_dashboard_backfill.yml/runs?status=completed&per_page=100" \
            | python3 -c "
          import sys, json
          runs = json.load(sys.stdin).get('workflow_runs', [])
          for r in runs:
              print(r['id'])
          ")

          for RUN_ID in $RUNS; do
            if [ "$RUN_ID" != "$CURRENT" ]; then
              curl -s -X DELETE "${HEADERS[@]}" \
                "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID"
              echo "Deleted run $RUN_ID"
            fi
          done
          echo "Cleanup complete."
          
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill reconciliation
        env:
          HISTORY_DB_PATH: ${{ github.workspace }}/idvt-history/history.db
        run: python generate_backfill.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit cache back to dashboard repo
        # Same rationale as the live-loop workflow: persists cache/ and
        # dashboard/manifest.json so accumulated state survives between
        # ephemeral runner VMs. See deploy_dashboard.yml for full notes.
        run: |
          git config user.name  "IDVTuber Dashboard"
          git config user.email "dashboard@idvtuber-tracker"
          git add cache/ dashboard/manifest.json
          if git diff --cached --quiet; then
            echo "Cache and manifest unchanged — nothing to commit."
          else
            git commit -m "cache: backfill reconciliation update [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
            echo "Cache committed and pushed."
          fi
